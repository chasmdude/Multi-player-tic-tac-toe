upstream nakama_backend {
    server nakama:7350;
    keepalive 64;
}

server {
    listen 80;
    server_name _;

    # ── Nakama REST / gRPC-gateway ─────────────────────────────────────
    location /v2/ {
        proxy_pass         http://nakama_backend;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Connection        "";

        # CORS is handled here — Nakama itself never sees cross-origin
        add_header Access-Control-Allow-Origin  "*" always;
        add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Authorization, Content-Type, Accept" always;
        add_header Access-Control-Allow-Credentials "true" always;

        if ($request_method = OPTIONS) {
            return 204;
        }
    }

    # ── Nakama WebSocket (real-time) ───────────────────────────────────
    location /ws {
        proxy_pass         http://nakama_backend;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host       $host;
        proxy_read_timeout 86400s;   # keep WS alive up to 24 h
        proxy_send_timeout 86400s;
    }

    # ── Frontend (Development: Proxy to Vite, Production: Serve files) ──────────────────
    location / {
        # DEVELOPMENT OPTION: Proxy to the Vite dev server running on the host
        # Replace 'host.docker.internal' if using a different environment.
        # proxy_pass         http://host.docker.internal:5173;

        # PRODUCTION OPTION (Comment out above and use this):
        root       /usr/share/nginx/html;
        index      index.html;
        try_files  $uri $uri/ /index.html;
    }

    # ── Health / readiness probe ───────────────────────────────────────
    location /health {
        access_log off;
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }
}
